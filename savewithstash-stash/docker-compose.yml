version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: savewithstash-stash_web_1
      APP_PORT: 5173

  web:
    image: savewithstash/stash:1.0.0
    restart: on-failure
    stop_grace_period: 30s
    environment:
      PORT: 5173
    volumes:
      - ${APP_DATA_DIR}/data:/app/data
      - ${APP_DATA_DIR}/models:/app/models
