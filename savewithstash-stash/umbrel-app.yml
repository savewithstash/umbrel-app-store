manifestVersion: 1
id: savewithstash-stash
category: ai
name: Stash
version: "1.0.0"
tagline: Hoard everything, find anything — your private on-device AI inbox
description: >-
  A chat-style replacement for that private Discord channel where you dump
  links, images, code, quotes, and reminders. Everything is automatically
  classified by type & category, filed by date, and made semantically
  searchable — and you can ask an AI questions that get answered from your
  own saved items.


  Powered entirely by QVAC running on-device. No accounts, no cloud,
  nothing leaves your Umbrel.


  Note: the first run downloads ~1.3 GB of model weights (Qwen3 1.7B +
  EmbeddingGemma 300M) into the app's data directory. AI features switch on
  once the models report Ready; saving and browsing notes works immediately.
